<div>
  <h1>{{ task().bezeichnung }} [{{task().id}}]</h1>
  <h2>Aufwände:</h2>
  @if (task().efford.size > 0) {
  <ul>
    @for (entry of task().efford; track entry[0]) {
      <li>{{entry[0] | date:'mediumDate' }}: {{ entry[1] }}</li>
    }
  </ul>
  } @else {
    <p>noch keine Aufwände gebucht</p>
  }
</div>
