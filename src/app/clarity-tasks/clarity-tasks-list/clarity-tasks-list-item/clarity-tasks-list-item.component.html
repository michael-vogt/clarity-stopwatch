  <div class="grid-cell">
    <span class="task-bezeichnung">{{ task().bezeichnung }}</span><br/>
    <span class="task-id">{{ task().id }}</span>
  </div>
  @for (day of daysOfWeek(); track day) {
    <div class="grid-cell">{{ day }}</div>
  }
</div>
